<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>

    <div id="didYouKnow" class="did-you-know" style="margin: 0 auto 18px auto; max-width: 700px; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #0b3d9122; padding: 18px 20px; color: #0b3d91; font-size: 1.1rem; font-weight: bold; text-align: center;"></div>
    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button>Get Space Images</button>
    </div>

    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>

    <!-- NASA Large Logo at the bottom for branding -->
    <div style="width:100%;text-align:center;margin-top:40px;">
      <img src="img/NASA-Logo-Large.jpg" alt="NASA Large Logo" style="max-width:220px;width:80vw;height:auto;opacity:0.92;" />
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
